<!doctype html>
<html>
    <head>
        <title>
            Student Registration Form      
        </title>
        <link rel="stylesheet" href="index_external.css">
    </head>
    <body>
       
        <form action="success.html">
        <table>
             <h1>Student Registration Form</h1>
            <tr>
        <td>Roll No:</td>
        <td>
        <input type="Text" name="Roll" required></td></tr>
       <tr>
        <td>Student Name:</td>
         <td>
        <input type="text" name="fname" placeholder="Firstname" required>
        <input type="text" name="lname" placeholder="Lastname" required></td></tr>
        <tr>
            <td>Father Name:</td>
            <td>
                <input type="text" name="Father"required>
            </td>
        </tr>
        <tr>
            <td>Date of Birth</td>
            <td>
                
                <input type="date" name="dob"required>
            </td>
        </tr>
        <tr>
            <td>Mobile No:</td>
            <td>
                
                <input type="tel" name="Mobile" required>
            </td>
        </tr>
        <tr>
            <td>Email Id:</td>
            <td>
                
                <input type="email" name="Email"required>
            </td>
        </tr>
        <tr>
            <td>Password:</td>
            <td>
            
                <input type="password" name="password"required>
            </td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
        
                <input type="radio" value="male" Name="Gender" required>male
                <input type="radio" value="Female" Name="Gender"required>Female
            </td>
        </tr>
        <tr>
            <td>Department:</td>
            <td>
                
                <input type="radio" value="CSD" Name="Department"required>CSE
                <input type="radio" value="IT" Name="Department"required>IT
                <input type="radio" value="ECE" Name="Department"required>ECE
                <input type="radio" value="CIVIL" Name="Department"required>CIVIL
                <input type="radio" value="MECH"Name="Department"required>MECH

            </td>
        </tr>
        <tr>
            <td>Course:</td>
            <td>
                
                <select course="Dropdown"required>
                    <option value=""select course></option>
                    <option value="Python">Python</option>
                    <option value="C Language">C Language</option>
                    <option value="Java">Java</option>
                    <option value="Full Stack Development">Full Stack Development</option>

                </select>
            </td>
        </tr>
        <tr>
            <td>Student Photo:</td>
            <td>
                
                <input type="file"  name="Photo" accept="image/*"required> 
            </td>
        </tr>
        <tr>
            <td>Resume:</td>
            <td>
                
                <input type="file" name="Resume" accept=".pdf"required>
            </td>
        </tr>
        <tr>
            <td>City:</td>
            <td>
        
                <input type="text" name="City"required>
            </td>
        </tr>
        <tr>
            <td>Address:</td>
            <td>
                
                <textarea rows="2" coloums="2"required></textarea>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <button type="submit">submit</button>
            </td>
        </tr>
    </tr>

        </table>
        </form>

    </body>
</html>
